apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
          
      - job_name: 'grafana'
        static_configs:
          - targets: ['grafana.observability.svc.cluster.local:3000']

      - job_name: 'loki'
        static_configs:
          - targets: ['loki.observability.svc.cluster.local:3100']

      - job_name: 'tempo'
        static_configs:
          - targets: ['tempo.observability.svc.cluster.local:9090']

      - job_name: 'demo-app'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - eu-health-interop-lab
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: demo-app
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http

