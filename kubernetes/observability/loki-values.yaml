deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

# 👇 MUITO IMPORTANTE — desliga o modo scalable que vem ativo por default
simpleScalable:
  replicas: 0

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

# 👇 modo que realmente vamos usar
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi

service:
  type: ClusterIP