                O que isso significa:
                A maior parte da memória heap está sendo ocupada por objetos que não podem ser liberados, reduzindo drasticamente a folga da JVM.

                Possíveis causas:
                - Crescimento natural da aplicação.
                - Cache excessivo.
                - Vazamento de memória (memory leak).
                - Objetos de longa duração.
                - Processamento de grandes volumes em memória.

                Impacto:
                Com pouca memória disponível, a JVM tende a executar GC com maior frequência e duração, aumentando latência. Se o crescimento continuar, pode ocorrer OutOfMemoryError, causando reinício do serviço e indisponibilidade.

                Ações recomendadas:
                - Correlacionar com métricas de GC (tempo e frequência).
                - Avaliar tendência de crescimento da heap.
                - Revisar uso de caches.
                - Investigar possíveis memory leaks.
                - Validar se o tamanho da heap está adequado ao workload.
