image: node:20

stages:
  - install
  - test
  - quality
  - security
  - container-scan
  - k8s-validate

# Cache global
cache:
  paths:
    - node_modules/

# =========================================================
# INSTALL (Node apps)
# =========================================================
install_node:
  stage: install
  script:
    - if [ -f package.json ]; then npm ci; else echo "No Node project"; fi
  artifacts:
    paths:
      - node_modules/
    expire_in: 1h

# =========================================================
# TESTS (Node apps)
# =========================================================
tests_node:
  stage: test
  script:
    - |
      if [ -f package.json ]; then
        if npm run | grep -q " test"; then
          npm test
        else
          echo "No tests found — skipping"
        fi
      else
        echo "No Node project — skipping"
      fi

# =========================================================
# ESLINT
# =========================================================
eslint:
  stage: quality
  script:
    - if [ -f package.json ]; then npx eslint . || true; fi

# =========================================================
# PYTHON LINT (para seus microservices)
# =========================================================
flake8:
  stage: quality
  image: python:3.11
  script:
    - pip install flake8
    - flake8 kubernetes/apps || true

# =========================================================
# NPM VULNERABILITY SCAN
# =========================================================
npm_audit:
  stage: security
  script:
    - if [ -f package.json ]; then npm audit --audit-level=high || true; fi

# =========================================================
# PYTHON DEPENDENCY SCAN
# =========================================================
pip_audit:
  stage: security
  image: python:3.11
  script:
    - pip install pip-audit
    - find . -name "requirements.txt" -exec pip-audit -r {} \; || true

# =========================================================
# SECRET SCAN
# =========================================================
gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --verbose --no-git || true

# =========================================================
# TRIVY FILESYSTEM SCAN (repo inteiro)
# =========================================================
trivy_fs:
  stage: security
  image:
    name: aquasec/trivy:0.50.2
    entrypoint: [""]
  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 0 .

# =========================================================
# DOCKERFILE LINT
# =========================================================
hadolint:
  stage: container-scan
  image: hadolint/hadolint:latest-debian
  script:
    - find . -name "Dockerfile" -exec hadolint {} \; || true

# =========================================================
# BUILD DAS IMAGENS (sem push)
# =========================================================
docker_build_test:
  stage: container-scan
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "Building all Dockerfiles just to validate..."
    - |
      for dockerfile in $(find . -name Dockerfile); do
        echo "Building $dockerfile"
        docker build -f $dockerfile -t test-image $(dirname $dockerfile)
      done

# =========================================================
# SCAN DAS IMAGENS DOCKER
# =========================================================
trivy_images:
  stage: container-scan
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
  script:
    - |
      for dockerfile in $(find . -name Dockerfile); do
        docker build -f $dockerfile -t test-image $(dirname $dockerfile)
        ./bin/trivy image --severity HIGH,CRITICAL --exit-code 0 test-image
      done

# =========================================================
# KUBERNETES LINT (manifests)
# =========================================================


# =========================================================
# KUBERNETES DRY RUN
# =========================================================
kubernetes_dry_run:
  stage: k8s-validate
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  script:
    - kubectl version --client
    - |
      find kubernetes -type f \( -name "*.yml" -o -name "*.yaml" \) \
      -exec kubectl apply --dry-run=client -f {} \;