image: node:20

stages:
  - install
  - test
  - quality
  - security
  - container-scan
  - k8s-validate

# Cache global
cache:
  paths:
    - node_modules/

# =========================================================
# INSTALL (Node apps)
# =========================================================
install_node:
  stage: install
  script:
    - if [ -f package.json ]; then npm ci; else echo "No Node project"; fi
  artifacts:
    paths:
      - node_modules/
    expire_in: 1h

# =========================================================
# TESTS (Node apps)
# =========================================================
tests_node:
  stage: test
  script:
    - |
      if [ -f package.json ]; then
        if npm run | grep -q " test"; then
          npm test
        else
          echo "No tests found — skipping"
        fi
      else
        echo "No Node project — skipping"
      fi

# =========================================================
# ESLINT
# =========================================================
eslint:
  stage: quality
  script:
    - if [ -f package.json ]; then npx eslint . || true; fi

# =========================================================
# PYTHON LINT (para seus microservices)
# =========================================================
flake8:
  stage: quality
  image: python:3.11
  script:
    - pip install flake8
    - flake8 kubernetes/apps || true

# =========================================================
# NPM VULNERABILITY SCAN
# =========================================================
npm_audit:
  stage: security
  script:
    - if [ -f package.json ]; then npm audit --audit-level=high || true; fi

# =========================================================
# PYTHON DEPENDENCY SCAN
# =========================================================
pip_audit:
  stage: security
  image: python:3.11
  script:
    - pip install pip-audit
    - find . -name "requirements.txt" -exec pip-audit -r {} \; || true

# =========================================================
# SECRET SCAN
# =========================================================
gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --verbose --no-git || true

# =========================================================
# TRIVY FILESYSTEM SCAN (repo inteiro)
# =========================================================
trivy_fs:
  stage: security
  image:
    name: aquasec/trivy:0.50.2
    entrypoint: [""]
  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 0 .

# =========================================================
# DOCKERFILE LINT
# =========================================================
hadolint:
  stage: container-scan
  image: hadolint/hadolint:latest-debian
  script:
    - find . -name "Dockerfile" -exec hadolint {} \; || true

# =========================================================
# BUILD DAS IMAGENS (sem push)
# =========================================================
docker_build_test:
  stage: container-scan
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "Building all Dockerfiles just to validate..."
    - |
      for dockerfile in $(find . -name Dockerfile); do
        echo "Building $dockerfile"
        docker build -f $dockerfile -t test-image $(dirname $dockerfile)
      done

# =========================================================
# SCAN DAS IMAGENS DOCKER
# =========================================================
trivy_images:
  stage: container-scan
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
  script:
    - |
      for dockerfile in $(find . -name Dockerfile); do
        docker build -f $dockerfile -t test-image $(dirname $dockerfile)
        ./bin/trivy image --severity HIGH,CRITICAL --exit-code 0 test-image
      done

# =========================================================
# KUBERNETES LINT (manifests)
# =========================================================


# -------------------------
# BUILD DOCKER IMAGES
# -------------------------
docker_build_push:
  stage: security
  image: docker:25
  services:
    - docker:25-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

  script:
    - export TAG=$CI_COMMIT_SHORT_SHA

    # demo-app
    - docker build -t $CI_REGISTRY_IMAGE/demo-app:$TAG kubernetes/apps/demo-app
    - docker push $CI_REGISTRY_IMAGE/demo-app:$TAG

    # eu-health
    - docker build -t $CI_REGISTRY_IMAGE/de-registry:$TAG kubernetes/apps/eu-health-interop-lab/de-registry
    - docker push $CI_REGISTRY_IMAGE/de-registry:$TAG

    - docker build -t $CI_REGISTRY_IMAGE/eu-gateway:$TAG kubernetes/apps/eu-health-interop-lab/eu-gateway
    - docker push $CI_REGISTRY_IMAGE/eu-gateway:$TAG

    - docker build -t $CI_REGISTRY_IMAGE/pt-clinic:$TAG kubernetes/apps/eu-health-interop-lab/pt-clinic
    - docker push $CI_REGISTRY_IMAGE/pt-clinic:$TAG

    # messaging
    - docker build -t $CI_REGISTRY_IMAGE/exam-producer:$TAG kubernetes/apps/messaging-lab/exam-producer
    - docker push $CI_REGISTRY_IMAGE/exam-producer:$TAG

    - docker build -t $CI_REGISTRY_IMAGE/exam-consumer:$TAG kubernetes/apps/messaging-lab/exam-consumer
    - docker push $CI_REGISTRY_IMAGE/exam-consumer:$TAG

# =========================================================
# KUBERNETES DRY RUN
# =========================================================
validate_k8s:
  stage: test
  image:
    name: ghcr.io/yannh/kubeconform:latest
    entrypoint: [""]   # ⭐️ ESSENCIAL
  script:
    - kubeconform -summary -strict -ignore-missing-schemas k8s/